<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy: no remote code. Scripts/styles come only from
      the bundle ('self') and Vite's inline styles in dev ('unsafe-inline' for
      style is required by HMR; tightened automatically in the production build
      since electron-vite serves from file://).
    -->
    <!--
      Monaco loads its diff/editor logic in a Web Worker and ships a codicon
      font, so worker-src (blob: for Vite-built workers) and font-src are
      allowed. Still no remote origins — everything is bundled/local.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;"
    />
    <title>Maestro</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
