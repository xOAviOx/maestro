appId: build.maestro.app
productName: Maestro
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
# Windows target — primary, built on Windows.
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
# macOS target. Unsigned local build for testing (no Apple Developer ID).
mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.developer-tools
  identity: null
